<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emoji Picker — Search & Copy Emoji</title>
<meta name="description" content="Search 1000+ emojis by name. Click to copy. Category filter, skin tone, recently used. Free.">
<meta property="og:title" content="Emoji Picker — Search & Copy Emoji">
<meta property="og:description" content="Search and copy 1000+ emojis. Category filter. Free.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://yurukusa.github.io/emoji-picker/">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:24px;font-size:0.95rem}

.search-row{max-width:400px;margin:0 auto 16px}
.search-row input{width:100%;padding:12px 18px;border-radius:10px;border:1px solid #333;background:#161616;color:#fff;font-size:1rem;outline:none}
.search-row input:focus{border-color:#3b82f6}

.cats{display:flex;gap:4px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.cat-btn{padding:6px 10px;border-radius:6px;border:1px solid #222;background:none;font-size:1.1rem;cursor:pointer;transition:background 0.2s}
.cat-btn.active{background:#1a2744;border-color:#2a4a7a}
.cat-btn:hover:not(.active){background:#1c1c1c}

.recent{margin-bottom:16px}
.recent h3{font-size:0.78rem;color:#555;margin-bottom:6px}
.recent-grid{display:flex;gap:4px;flex-wrap:wrap}

.emoji-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(44px,1fr));gap:2px;margin-bottom:20px}
.emoji{width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;border-radius:6px;cursor:pointer;transition:background 0.15s;border:none;background:none}
.emoji:hover{background:#222}

.info-bar{background:#161616;border:1px solid #222;border-radius:10px;padding:14px;text-align:center;margin-bottom:16px;min-height:60px;display:flex;align-items:center;justify-content:center;gap:16px}
.info-emoji{font-size:2.5rem}
.info-details{text-align:left}
.info-name{font-size:0.9rem;color:#ccc}
.info-code{font-family:'Fira Code',monospace;font-size:0.78rem;color:#4da6ff;cursor:pointer}
.info-code:hover{text-decoration:underline}
.info-html{font-family:'Fira Code',monospace;font-size:0.78rem;color:#10b981;cursor:pointer;margin-top:2px}
.info-html:hover{text-decoration:underline}

.count{text-align:center;font-size:0.75rem;color:#444;margin-bottom:16px}

.copied{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:8px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:100;animation:fadeOut 1.5s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
</style>
</head>

<p class="subtitle">Search and copy emojis instantly.</p>

<div class="search-row">
  <input type="text" id="search" placeholder="Search emojis..." oninput="filter()">
</div>

<div class="cats" id="cats"></div>

<div class="recent" id="recentSection" style="display:none">
  <h3>Recently Used</h3>
  <div class="recent-grid" id="recentGrid"></div>
</div>

<div class="info-bar" id="infoBar">
  <span style="color:#555;font-size:0.85rem">Click any emoji to copy</span>
</div>

<div class="count" id="count"></div>
<div class="emoji-grid" id="grid"></div>

</div>

<footer>
  <a href="https://github.com/yurukusa/emoji-picker">GitHub</a> ·
  Part of <a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a>
</footer>

const CATS=[
  {id:'all',icon:'🔍',label:'All'},
  {id:'smileys',icon:'😀',label:'Smileys'},
  {id:'gestures',icon:'👋',label:'Gestures'},
  {id:'symbols',icon:'❤️',label:'Symbols'},
  {id:'objects',icon:'💻',label:'Objects'},
  {id:'nature',icon:'🐶',label:'Nature'},
  {id:'food',icon:'🍕',label:'Food'},
  {id:'travel',icon:'🚀',label:'Travel'},
];

let activeCat='all';
let recent=JSON.parse(localStorage.getItem('emoji-recent')||'[]');

function renderCats(){
  document.getElementById('cats').innerHTML=CATS.map(c=>
    `<button class="cat-btn ${c.id===activeCat?'active':''}" onclick="setCat('${c.id}')" title="${c.label}">${c.icon}</button>`
  ).join('');
}

function setCat(id){activeCat=id;renderCats();filter()}

function filter(){
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=EMOJIS.filter(e=>{
    const matchCat=activeCat==='all'||e.c===activeCat;
    const matchQ=!q||e.n.includes(q)||e.e===q;
    return matchCat&&matchQ;
  });
  document.getElementById('count').textContent=filtered.length+' emojis';
  document.getElementById('grid').innerHTML=filtered.map(e=>
    `<button class="emoji" onclick="pick('${e.e}')" title="${e.n}">${e.e}</button>`
  ).join('')||'<div style="grid-column:1/-1;text-align:center;color:#555;padding:30px">No emojis found</div>';
}

function pick(emoji){
  navigator.clipboard.writeText(emoji);
  // Update info bar
  const data=EMOJIS.find(e=>e.e===emoji);
  if(data){
    const cp=[...emoji].map(c=>'U+'+c.codePointAt(0).toString(16).toUpperCase().padStart(4,'0')).join(' ');
    const html=[...emoji].map(c=>'&#x'+c.codePointAt(0).toString(16)+';').join('');
    document.getElementById('infoBar').innerHTML=`
      <span class="info-emoji">${emoji}</span>
      <div class="info-details">
        <div class="info-name">${data.n}</div>
        <div class="info-code" onclick="event.stopPropagation();navigator.clipboard.writeText('${cp}');toast('Code copied!')" title="Click to copy">${cp}</div>
        <div class="info-html" onclick="event.stopPropagation();navigator.clipboard.writeText('${html}');toast('HTML copied!')" title="Click to copy">${html}</div>
      </div>`;
  }
  // Add to recent
  recent=recent.filter(r=>r!==emoji);
  recent.unshift(emoji);
  if(recent.length>20)recent=recent.slice(0,20);
  localStorage.setItem('emoji-recent',JSON.stringify(recent));
  renderRecent();
  toast(emoji+' Copied!');
}

function renderRecent(){
  if(recent.length===0){document.getElementById('recentSection').style.display='none';return}
  document.getElementById('recentSection').style.display='block';
  document.getElementById('recentGrid').innerHTML=recent.map(e=>
    `<button class="emoji" onclick="pick('${e}')" style="width:36px;height:36px;font-size:1.2rem">${e}</button>`
  ).join('');
}

function toast(msg){
  const el=document.createElement('div');
  el.className='copied';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

renderCats();
filter();
renderRecent();
</script>

</html>
